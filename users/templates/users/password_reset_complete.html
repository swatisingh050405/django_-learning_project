{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Reset Complete - techdesk{% endblock %}

{% block content %}
<section style="padding: 5rem 0; background: #fafafa; min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center p-5 shadow-sm"
                    style="background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb;">
                    <div
                        style="width: 64px; height: 64px; background: #d1fae5; color: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h3 class="fw-bold" style="color: #111827;">All Set!</h3>
                    <p class="text-muted mt-2 mb-4 small" style="line-height: 1.6;">
                        Your password entry has been successfully verified and modified across our decentralized
                        systems. You are good to go!
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-success w-100 py-2 fw-medium"
                        style="background-color: #059669; border: none;">
                        Sign In with New Password
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
