{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Reset Password - techdesk{% endblock %}

{% block content %}
<section style="padding: 5rem 0; background: #fafafa; min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="pf-card p-4 shadow-sm"
                    style="background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb;">
                    <div class="text-center mb-4">
                        <div
                            style="width: 56px; height: 56px; background: #ecfdf5; color: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem;">
                            <i class="bi bi-key"></i>
                        </div>
                        <h2 class="fw-bold" style="color: #111827;">Forgot Password?</h2>
                        <p class="text-muted small">No worries! Enter your registered email address below, and we will
                            handle the rest.</p>
                    </div>

                    <form method="POST" novalidate>
                        {% csrf_token %}

                        <div class="pf-field mb-3">
                            <label class="pf-label fw-semibold text-secondary small mb-1" for="id_email">Email Address
                                <span class="pf-required text-danger">*</span></label>
                            <input type="email" name="email" autocomplete="email" maxlength="254" required
                                class="form-control py-2 px-3 border-secondary-subtle" id="id_email"
                                placeholder="name@domain.com">
                        </div>

                        <button class="btn btn-success w-100 mt-2 py-2 fw-medium"
                            style="background-color: #059669; border: none;" type="submit">
                            Send Recovery Link
                        </button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3">
                        <a href="{% url 'login' %}" class="text-decoration-none small text-secondary fw-medium"><i
                                class="bi bi-arrow-left"></i> Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
